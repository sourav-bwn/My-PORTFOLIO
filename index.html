<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sourav Garai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #020202;
  color: white;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 500px;
  height: 200px;
  background: radial-gradient(circle, #3b82f6, transparent);
  filter: blur(100px);
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1;
  animation: pulse 6s infinite alternate;
}

@keyframes pulse {
  from { transform: translate(-50%, -50%) scale(1); }
  to { transform: translate(-50%, -50%) scale(1.3); }
}

/* HERO SECTION */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.hero h1 {
  font-size: 70px;
  letter-spacing: 10px;
}

.hero h1 span {
  color: #3b82f6;
}

.scroll {
  position: absolute;
  bottom: 40px;
  font-size: 25px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* SECTIONS */
.section {
  min-height: 100vh;
  padding: 100px 20px;
}

/* ABOUT */
.container {
  max-width: 1200px;
  margin: auto;
  display: flex;
  gap: 60px;
  align-items: center;
}

.left img {
  width: 300px;
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
}

.right {
  flex: 1;
}

.box {
  margin-bottom: 25px;
}

.box h2 {
  color: #3b82f6;
  margin-bottom: 10px;
}

.box p {
  color: #bbb;
  line-height: 1.6;
}

.skills span {
  border: 1px solid #3b82f6;
  padding: 8px 12px;
  margin: 5px;
  display: inline-block;
  border-radius: 6px;
  transition: 0.3s;
}

.skills span:hover {
  background: #3b82f6;
}

.social {
  display: flex;
  gap: 15px;
}

.social a {
  font-size: 20px;
  color: #bbb;
  transition: 0.3s;
}

.social a:hover {
  color: #3b82f6;
  transform: translateY(-3px);
}

/* PROJECTS */
.projects {
  max-width: 1200px;
  margin: auto;
}

.projects h2 {
  color: #3b82f6;
  margin-bottom: 30px;
}

.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #111;
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 30px #3b82f6;
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  color: #bbb;
}

/* SCROLL REVEAL */
.reveal {
  opacity: 0;
  transform: translateY(60px);
  transition: 1s;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: rgba(255,255,255,0.5);
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 768px) {
  .hero h1 { font-size: 40px; letter-spacing: 5px; }
  
  .container {
    flex-direction: column;
    text-align: center;
  }
  
  .left img {
    margin: auto;
  }
  
  .social {
    justify-content: center;
  }
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <h1>PORTFOLIO<span>.</span></h1>
  <a href="#about" class="scroll">↓</a>
</section>

<!-- ABOUT -->
<section class="section reveal" id="about">

<div class="container">

<div class="left">
<img src="https://i.ibb.co/4nKKTkVP/Picsart-26-04-21-22-50-10-704.png">
</div>

<div class="right">

<div class="box">
<h2>About Me</h2>
<p>I am a passionate developer and AI enthusiast building real-world projects.</p>
</div>

<div class="box">
<h2>Skills</h2>
<div class="skills">
<span>HTML</span><span>CSS</span><span>JS</span><span>React</span>
</div>
</div>

<div class="social">
<a href="https://github.com/sourav-bwn"><i class="fab fa-github"></i></a>
<a href="https://wa.me/919382284376"><i class="fab fa-whatsapp"></i></a>
</div>

</div>

</div>

</section>

<!-- PROJECTS -->
<section class="section reveal">

<div class="projects">

<h2>Projects</h2>

<div class="project-grid">

<div class="card">
<h3>AI Project</h3>
<p>Custom AI built without API.</p>
</div>

<div class="card">
<h3>Web App</h3>
<p>Modern responsive UI project.</p>
</div>

<div class="card">
<h3>Portfolio</h3>
<p>Interactive animated portfolio.</p>
</div>

</div>

</div>

</section>

<div class="footer">
©2026 Sourav Garai
</div>

<script>
window.addEventListener("scroll", () => {
  document.querySelectorAll(".reveal").forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100) {
      el.classList.add("active");
    }
  });
});
</script>

</body>
</html>
