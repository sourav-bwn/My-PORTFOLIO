<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      text-align: center;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 250px;
      background: radial-gradient(circle at 30% 30%, #4f8cff, #8a2be2, #000);
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: move 8s infinite alternate ease-in-out;
    }

    @keyframes move {
      0% {
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        transform: translate(-50%, -50%) scale(1.3);
      }
    }

    h1 {
      position: relative;
      font-size: 60px;
      color: white;
      letter-spacing: 8px;
      font-weight: 600;
      text-shadow: 0 0 20px rgba(79, 140, 255, 0.4);
    }

    .dot {
      color: #4f8cff;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      letter-spacing: 1px;
    }

    .footer span {
      transition: 0.3s;
    }

    .footer span:hover {
      color: #4f8cff;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 40px;
        letter-spacing: 4px;
      }
      .blob {
        width: 300px;
        height: 150px;
      }
      .footer {
        padding: 0 20px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
        letter-spacing: 2px;
      }
      .blob {
        width: 250px;
        height: 120px;
      }
      .footer {
        flex-direction: column;
        align-items: center;
        gap: 5px;
        bottom: 10px;
      }
      .name, .copyright {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="blob"></div>
    <h1>PORTFOLIO<span class="dot">.</span></h1>
  </div>

  <div class="footer">
    <span class="name">Sourav Garai</span>
    <span class="copyright">©2026</span>
  </div>

</body>
</html>
